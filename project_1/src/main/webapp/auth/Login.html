<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Welcome back 👋</h1>
        <p>Continue your UC transfer plan.</p>

        <form onsubmit="return handleLoginSubmit()">
            <label for="email">Email</label>
            <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="example@gmail.com"
                    required>
            <small>Use the email connected to your transfer profile.</small>

            <label for="password">Password</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

            <div class="link-right">
                <a href="Reset_password.html">Reset Password</a>
            </div>

            <button type="submit">Continue to My Transfer Plan</button>
        </form>

        <p class="note">
            Your information is used to personalize your transfer guidance.
        </p>

        <div class="back-link">
            <a href="Welcome.html">← Back to Home</a>
        </div>
    </div>
</div>

<script src="auth.js"></script>
</body>
</html>
