<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <link rel="stylesheet" href="auth.css">
</head>

<body>

<div class="container">

    <div class="card large-card">

        <h1>Create Account</h1>

        <p>
            Create your Transfer Hub profile.
        </p>

        <form action="CreateAccount"
              method="post">

            <label>First Name</label>

            <input type="text"
                   name="first_name"
                   required>

            <label>Last Name</label>

            <input type="text"
                   name="last_name"
                   required>

            <label>Email</label>

            <input type="email"
                   name="email"
                   required>

            <label>Password</label>

            <input type="password"
                   name="password"
                   minlength="8"
                   required>

            <label>Role</label>

            <select name="role"
                    id="role-select"
                    required>

                <option value="">
                    Select role
                </option>

                <option value="cc_student">
                    CC Student
                </option>

                <option value="uc_student">
                    UC Student
                </option>

                <option value="professor">
                    Professor
                </option>

            </select>

            <label>Current School</label>

            <select name="school_id"
                    required>

                <option value="">
                    Select school
                </option>

                <option value="1">
                    East Los Angeles College
                </option>

                <option value="2">
                    Los Angeles City College
                </option>

                <option value="3">
                    Los Angeles Harbor College
                </option>

                <option value="4">
                    Los Angeles Mission College
                </option>

                <option value="5">
                    Los Angeles Pierce College
                </option>

                <option value="6">
                    Los Angeles Southwest College
                </option>

                <option value="7">
                    Los Angeles Trade-Technical College
                </option>

                <option value="8">
                    Los Angeles Valley College
                </option>

                <option value="9">
                    West Los Angeles College
                </option>

                <option value="10">
                    UC Berkeley
                </option>

                <option value="11">
                    UCLA
                </option>

                <option value="12">
                    UC Santa Barbara
                </option>

                <option value="13">
                    UC San Diego
                </option>

                <option value="14">
                    UC Irvine
                </option>

                <option value="15">
                    UC Davis
                </option>

                <option value="16">
                    UC Santa Cruz
                </option>

                <option value="17">
                    UC Riverside
                </option>

                <option value="18">
                    UC Merced
                </option>

            </select>

            <label id="major-label">
                Major
            </label>

            <select name="major_id"
                    required>

                <option value="">
                    Select...
                </option>

                <option value="1">
                    Computer Science
                </option>

                <option value="2">
                    Data Science
                </option>

                <option value="3">
                    Physics
                </option>

            </select>

            <div id="interested-school-section">

                <label>
                    Interested UC School
                </label>

                <select name="interested_school_id">

                    <option value="">
                        Select UC
                    </option>

                    <option value="10">
                        UC Berkeley
                    </option>

                    <option value="11">
                        UCLA
                    </option>

                    <option value="12">
                        UC Santa Barbara
                    </option>

                    <option value="13">
                        UC San Diego
                    </option>

                    <option value="14">
                        UC Irvine
                    </option>

                    <option value="15">
                        UC Davis
                    </option>

                    <option value="16">
                        UC Santa Cruz
                    </option>

                    <option value="17">
                        UC Riverside
                    </option>

                    <option value="18">
                        UC Merced
                    </option>

                </select>

            </div>

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="back-link">

            <a href="Login.html">

                Already have an account?

            </a>

        </div>

    </div>

</div>

<script>

    const roleSelect =
        document.getElementById("role-select");

    const majorLabel =
        document.getElementById("major-label");

    const interestedSchoolSection =
        document.getElementById(
            "interested-school-section"
        );

    roleSelect.addEventListener("change", () => {

        if (roleSelect.value === "professor") {

            majorLabel.textContent =
                "Department";

            interestedSchoolSection.style.display =
                "none";

        } else {

            majorLabel.textContent =
                "Major";

            interestedSchoolSection.style.display =
                "block";
        }
    });

</script>

</body>
</html>
