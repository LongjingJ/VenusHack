<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transfer Hub — Network</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="auth.css">
</head>

<body class="app-page">
<nav>
  <a class="logo" href="MainPage.html">
    <div class="logo-icon">TH</div>
    Transfer Hub
  </a>

  <div class="nav-links">
    <button class="nav-btn" onclick="window.location.href='MainPage.html'"><i class="ti ti-home"></i> Main</button>
    <button class="nav-btn active"><i class="ti ti-users"></i> Network</button>
    <button class="nav-btn" onclick="window.location.href='events.html'"><i class="ti ti-calendar-event"></i> Events</button>
  </div>

  <div class="avatar" id="nav-avatar">--</div>
</nav>

<div class="body">
  <aside>
    <div class="profile-box">
      <div class="profile-av" id="profile-avatar">--</div>
      <div class="profile-name" id="profile-name">Loading...</div>
      <div class="profile-sub" id="profile-school">Loading school...</div>
      <div class="profile-sub" id="profile-major">Loading major...</div>
    </div>

    <div class="sb-divider"></div>

    <div class="rb-title">Your progress</div>
    <div class="prog-box">
      <div class="prog-label">Transfer readiness</div>
      <div class="prog-bar">
        <div class="prog-fill" style="width:72%"></div>
      </div>
      <div class="prog-pct">72% complete</div>
      <div class="prog-hint">Missing: TAG app, 2 recs</div>
    </div>

    <div class="rb-title">Deadlines</div>
    <div class="deadline-row">
      <span>UC application</span>
      <span style="color:#e24b4a;font-weight:500">Nov 30</span>
    </div>
    <div class="deadline-row">
      <span>TAG deadline</span>
      <span style="color:#ef9f27;font-weight:500">Sep 30</span>
    </div>
    <div class="deadline-row">
      <span>IGETC petition</span>
      <span>Jun 15</span>
    </div>
  </aside>

  <main>
    <div class="sec-header">
      <h3>My Network</h3>
      <button class="conn-btn" style="padding: 4px 12px;">
        <i class="ti ti-filter"></i> Recommended
      </button>
    </div>

    <div id="recommendations-container"></div>
  </main>

</div>

<script src="network.js"></script>
</body>
</html>
